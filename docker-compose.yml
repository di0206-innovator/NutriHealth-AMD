version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    target: backend-builder
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app/server
    env_file:
      - ./server/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
  
  frontend:
    image: node:20-slim
    working_dir: /app/client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
    command: npm run dev -- --host
